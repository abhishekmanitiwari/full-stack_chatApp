apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: chatapp-backend
          image: abhishekmani1121/full-stack-chatapp-backend
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: mongodb://root:admin@mongo:27017/chatApp?authSource=admin&retryWrites=true&w=majority
            - name: PORT
              value: "5001"
            - name: JWT_SECRET                      
              valueFrom:
                secretKeyRef:
                  name: chat-app-secret
                  key: jwt